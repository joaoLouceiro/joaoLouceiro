<svg width="830" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(200px)}}
@keyframes pulse{0%,100%{opacity:.15}50%{opacity:1}}
@keyframes glow{0%,100%{opacity:.8}50%{opacity:1}}
.cur{animation:blink 1.1s step-end infinite}
.scl{animation:scan 7s linear infinite}
.d1{animation:pulse 2.2s ease-in-out infinite}
.d2{animation:pulse 2.2s ease-in-out .35s infinite}
.d3{animation:pulse 2.2s ease-in-out .7s infinite}
.ttl{animation:glow 4s ease-in-out infinite}
</style>
