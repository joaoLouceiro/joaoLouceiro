<line x1="800" y1="0" x2="800" y2="200" stroke="#0d1f2d" stroke-width="0.5"/>
<line x1="900" y1="0" x2="900" y2="200" stroke="#0d1f2d" stroke-width="0.5"/>
<line x1="1000" y1="0" x2="1000" y2="200" stroke="#0d1f2d" stroke-width="0.5"/>
<line x1="1100" y1="0" x2="1100" y2="200" stroke="#0d1f2d" stroke-width="0.5"/>
<line x1="0" y1="0" x2="1200" y2="0" stroke="#64ffda" stroke-width="1.5" opacity="0.12" class="scl"/>
